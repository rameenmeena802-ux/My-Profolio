<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Gallery</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>🌿 Nature Explorer Gallery</h1>
    <p>Beautiful places around the world</p>
  </header>

  <div class="gallery">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=800" />
      <div class="info"><h3>Mountain</h3><p>Snowy peaks</p></div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800" />
      <div class="info"><h3>Forest</h3><p>Green trees</p></div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=800" />
      <div class="info"><h3>River</h3><p>Calm water</p></div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800" />
      <div class="info"><h3>Beach</h3><p>Sea waves</p></div>
    </div>

    <div class="card">
      <img src= https://images.unsplash.com/photo-1501973801540-537f08ccae7b?w=800
      <div class="info"><h3>Sunset</h3><p>Golden sky</p></div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1520962922320-2038eebab146?w=800" />
      <div class="info"><h3>Waterfall</h3><p>Falling water</p></div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6?w=800" />
      <div class="info"><h3>Flowers</h3><p>Colorful garden</p></div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=800" />
      <div class="info"><h3>Desert</h3><p>Sand dunes</p></div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800" />
      <div class="info"><h3>Night Sky</h3><p>Stars galaxy</p></div>
    </div>

  </div>

</body>
</html>
